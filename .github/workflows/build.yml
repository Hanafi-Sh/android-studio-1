name: Rakit APK Pelacak Siluman

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest # Kita pinjam server Ubuntu milik GitHub

    steps:
    - name: Mengambil kode dari repositori
      uses: actions/checkout@v4

    - name: Menyiapkan Java (Mesin Utama)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Memberi izin eksekusi pada Gradle
      run: chmod +x gradlew

    - name: Merakit Aplikasi (Bikin APK)
      run: ./gradlew assembleDebug

    - name: Menyimpan Hasil APK agar bisa diunduh
      uses: actions/upload-artifact@v4
      with:
        name: PelacakSiluman-APK
        path: app/build/outputs/apk/debug/app-debug.apk